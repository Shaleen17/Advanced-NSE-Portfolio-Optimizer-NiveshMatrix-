[mongo]
# Paste this whole [mongo] block into Streamlit Cloud > App settings > Secrets.
uri = "mongodb+srv://<username>:<password>@<cluster-host>/?appName=<app-name>"
database = "niveshmatrix"
users_collection = "users"

[api_keys]
twelve_data = "YOUR_TWELVE_DATA_API_KEY"
fmp = "YOUR_FINANCIAL_MODELING_PREP_API_KEY"
alpha_vantage = "YOUR_ALPHA_VANTAGE_API_KEY"
marketstack = "YOUR_MARKETSTACK_API_KEY"
finnhub = "YOUR_FINNHUB_API_KEY"
